<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>{$sitename} - 测试支付</title>
  <link href="{$cdnpublic}twitter-bootstrap/3.4.1/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/captcha.css" type="text/css" />
  <style>
    /* ===== Design Tokens ===== */
    :root {
      --color-primary:        #2563eb;
      --color-primary-dark:   #1d4ed8;
      --color-primary-light:  #3b82f6;
      --color-accent:         #06b6d4;
      --color-success:        #10b981;
      --color-success-bg:     #ecfdf5;
      --color-success-border: #6ee7b7;
      --color-danger:         #ef4444;
      --color-text:           #1e293b;
      --color-text-sub:       #64748b;
      --color-border:         #e2e8f0;
      --color-bg:             #f1f5f9;
      --color-card:           #ffffff;
      --radius-sm:            6px;
      --radius-md:            12px;
      --radius-lg:            20px;
      --shadow-card:          0 4px 24px rgba(37,99,235,.10), 0 1px 4px rgba(0,0,0,.06);
      --shadow-btn:           0 2px 8px rgba(37,99,235,.25);
      --transition:           .18s cubic-bezier(.4,0,.2,1);
      --font-base:            -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: var(--color-bg);
      font-family: var(--font-base);
      color: var(--color-text);
      min-height: 100vh;
      margin: 0;
    }

    /* ===== Page Header Bar ===== */
    .pay-topbar {
      background: linear-gradient(135deg, #1e40af 0%, #2563eb 55%, #0891b2 100%);
      padding: 0;
      box-shadow: 0 2px 12px rgba(30,64,175,.3);
    }
    .pay-topbar-inner {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 24px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .pay-topbar-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pay-topbar-icon {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,.18);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .pay-topbar-icon .glyphicon {
      color: #fff;
      font-size: 16px;
    }
    .pay-topbar h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      letter-spacing: .3px;
    }
    .pay-topbar-back {
      font-size: 13px;
      color: rgba(255,255,255,.85);
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 20px;
      transition: var(--transition);
      backdrop-filter: blur(4px);
    }
    .pay-topbar-back:hover {
      background: rgba(255,255,255,.15);
      color: #fff;
      text-decoration: none;
    }

    /* ===== Main Wrapper ===== */
    .pay-wrapper {
      max-width: 560px;
      margin: 32px auto 48px;
      padding: 0 16px;
    }

    /* ===== Card ===== */
    .pay-card {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .pay-card-body {
      padding: 32px 28px 24px;
    }

    /* ===== Section Label ===== */
    .pay-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-sub);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ===== Field Group ===== */
    .pay-field {
      margin-bottom: 16px;
    }
    .pay-field-label {
      font-size: 12px;
      color: var(--color-text-sub);
      font-weight: 500;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pay-field-label .glyphicon {
      font-size: 12px;
      color: var(--color-primary-light);
    }
    .pay-input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--color-text);
      background: #f8fafc;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
      font-family: var(--font-base);
    }
    .pay-input:focus {
      border-color: var(--color-primary-light);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(59,130,246,.12);
    }
    .pay-input[disabled], .pay-input:disabled {
      background: #f1f5f9;
      color: var(--color-text-sub);
      cursor: not-allowed;
      border-color: #e2e8f0;
    }
    .pay-amount-wrap {
      position: relative;
    }
    .pay-amount-prefix {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      font-weight: 600;
      color: var(--color-primary);
      pointer-events: none;
      line-height: 1;
    }
    .pay-amount-wrap .pay-input {
      padding-left: 30px;
      font-size: 22px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: .5px;
      height: 52px;
    }
    .pay-amount-wrap .pay-input[disabled] {
      color: var(--color-text-sub);
    }

    /* ===== Divider ===== */
    .pay-divider {
      border: none;
      border-top: 1.5px solid var(--color-border);
      margin: 24px 0 20px;
    }

    /* ===== Success State ===== */
    .pay-success-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0 12px;
    }
    .pay-success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-success) 0%, #34d399 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(16,185,129,.3);
      animation: pop-in .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop-in {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .pay-success-icon .glyphicon {
      color: #fff;
      font-size: 28px;
    }
    .pay-success-text {
      font-size: 17px;
      font-weight: 600;
      color: var(--color-success);
      margin: 0;
    }
    .pay-success-sub {
      font-size: 13px;
      color: var(--color-text-sub);
      margin-top: 6px;
    }

    /* ===== Captcha ===== */
    #captcha {
      margin: 0 auto 20px;
      max-width: 340px;
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .captcha-loading-wrap {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ===== Pay Type Grid ===== */
    #paytype_wrap {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      margin-top: 8px;
    }
    #paytype_wrap .btn-group {
      display: contents;
    }
    .pay-method-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 48px;
      padding: 0 12px;
      background: #fff;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text);
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition), transform var(--transition);
      white-space: nowrap;
      overflow: hidden;
    }
    .pay-method-btn:hover {
      border-color: var(--color-primary-light);
      background: #eff6ff;
      color: var(--color-primary);
      box-shadow: var(--shadow-btn);
      transform: translateY(-2px);
    }
    .pay-method-btn:active {
      transform: translateY(0);
      background: #dbeafe;
    }
    .pay-method-btn[disabled] {
      color: var(--color-text-sub);
      cursor: not-allowed;
      background: #f8fafc;
      transform: none;
      box-shadow: none;
    }
    .pay-method-btn img {
      height: 20px;
      width: auto;
      flex-shrink: 0;
    }

    /* Bootstrap override: reset btn-group display inside our grid */
    .pay-card .btn-group > .btn,
    .pay-card .btn-group-justified > .btn-group > .btn {
      /* reset */
    }

    /* ===== Loading Dots (keep original captcha.css animation) ===== */
    .loading { display: flex; gap: 6px; justify-content: center; padding: 8px 0; }
    .loading-dot {
      width: 8px; height: 8px;
      background: var(--color-primary-light);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loading-dot:nth-child(1) { animation-delay: -0.32s; }
    .loading-dot:nth-child(2) { animation-delay: -0.16s; }
    .loading-dot:nth-child(3) { animation-delay: 0s; }
    .loading-dot:nth-child(4) { animation-delay: .16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* ===== Card Footer ===== */
    .pay-card-footer {
      background: #f8fafc;
      border-top: 1.5px solid var(--color-border);
      padding: 14px 28px;
      text-align: center;
      font-size: 12px;
      color: var(--color-text-sub);
    }

    /* ===== Secure Badge ===== */
    .pay-secure {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
    }
    .pay-secure .glyphicon {
      font-size: 13px;
      color: var(--color-success);
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .pay-wrapper { margin-top: 20px; padding: 0 10px; }
      .pay-card-body { padding: 24px 18px 18px; }
      #paytype_wrap { grid-template-columns: repeat(2, 1fr); }
      .pay-topbar-inner { padding: 16px 16px 14px; }
    }
  </style>
</head>
<body>

<!-- ===== Top Bar ===== -->
<div class="pay-topbar">
  <div class="pay-topbar-inner">
    <div class="pay-topbar-title">
      <div class="pay-topbar-icon">
        <span class="glyphicon glyphicon-credit-card"></span>
      </div>
      <h1>{$sitename} · 测试支付</h1>
    </div>
    <a href="/" class="pay-topbar-back">
      <span class="glyphicon glyphicon-chevron-left"></span>&nbsp;返回首页
    </a>
  </div>
</div>

<!-- ===== Main Card ===== -->
<div class="pay-wrapper">
  <div class="pay-card">
    <div class="pay-card-body">

      <form name="alipayment">
        <input type="hidden" name="csrf_token" id="csrf_token" value="">

        <!-- 订单信息 -->
        <div class="pay-section-label">订单信息</div>

        <div class="pay-field">
          <div class="pay-field-label">
            <span class="glyphicon glyphicon-barcode"></span>商户订单号
          </div>
          <input class="pay-input" placeholder="商户订单号"
            value="{$success_trade_no}" name="trade_no" id="trade_no"
            type="text" disabled="">
        </div>

        <div class="pay-field">
          <div class="pay-field-label">
            <span class="glyphicon glyphicon-shopping-cart"></span>商品名称
          </div>
          <input class="pay-input" placeholder="商品名称"
            value="支付测试" name="name" type="text" disabled="">
        </div>

        <hr class="pay-divider">

        <!-- 付款金额 -->
        <div class="pay-section-label">付款金额</div>
        <div class="pay-field">
          <div class="pay-amount-wrap">
            <span class="pay-amount-prefix">¥</span>
            <input class="pay-input" placeholder="0.00"
              value="{$success_money}" name="money" id="money"
              type="text" {if $show_success}disabled="disabled"{else/}required=""{/if}>
          </div>
        </div>

        <hr class="pay-divider" style="margin-top:8px;">

        <!-- 支付操作区 -->
        {if $show_success}
          <!-- 成功状态 -->
          <div class="pay-success-badge">
            <div class="pay-success-icon">
              <span class="glyphicon glyphicon-ok"></span>
            </div>
            <p class="pay-success-text">订单已支付成功！</p>
            <p class="pay-success-sub">感谢您的支付，订单正在处理中</p>
          </div>
        {else/}
          <!-- 验证码区域 -->
          <div class="list-group-item" id="captcha" style="display:none;">
            <div id="captcha_text" class="captcha-loading-wrap" style="color:#94a3b8;font-size:13px;">
              <span class="glyphicon glyphicon-refresh" style="animation:spin 1s linear infinite;"></span>
              正在加载验证码
            </div>
            <div id="captcha_wait">
              <div class="loading">
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
              </div>
            </div>
          </div>
          <div id="captchaform"></div>

          <!-- 支付方式 -->
          <div class="pay-section-label" style="margin-top:4px;margin-bottom:12px;">选择支付方式</div>
          <div id="paytype_wrap">
            <div class="btn-group" role="group">
              <button type="button" class="pay-method-btn" disabled>
                <span class="glyphicon glyphicon-refresh" style="animation:spin 1s linear infinite;font-size:13px;"></span>
                加载中...
              </button>
            </div>
          </div>

          <!-- 安全提示 -->
          <div class="pay-secure">
            <span class="glyphicon glyphicon-lock"></span>
            安全加密传输 · 信息严格保密
          </div>
        {/if}
      </form>

    </div>
    <div class="pay-card-footer">
      {$sitename} &copy; {:date("Y")} &nbsp;All Rights Reserved.
    </div>
  </div>
</div>

<!-- ===== Scripts ===== -->
<script src="{$cdnpublic}jquery/3.7.1/jquery.min.js"></script>
<script src="{$cdnpublic}twitter-bootstrap/3.4.1/js/bootstrap.min.js"></script>
<script src="{$cdnpublic}layer/3.1.1/layer.js"></script>
<script>
/* patch: ensure scripts added by geetest carry no-referrer */
window.appendChildOrg = Element.prototype.appendChild;
Element.prototype.appendChild = function() {
  if (arguments[0].tagName == 'SCRIPT') {
    arguments[0].setAttribute('referrerpolicy', 'no-referrer');
  }
  return window.appendChildOrg.apply(this, arguments);
};
</script>
<script src="//static.geetest.com/static/tools/gt.js"></script>
<script src="//static.geetest.com/v4/gt4.js"></script>
<script>
/* ===== spin keyframe for loading icons ===== */
(function(){
  var s = document.createElement('style');
  s.textContent = '@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}';
  document.head.appendChild(s);
})();

var captcha_open = 0;

/* ===== Geetest embed handler (unchanged logic) ===== */
var handlerEmbed = function (captchaObj) {
  captchaObj.appendTo('#captcha');
  captchaObj.onReady(function () {
    $("#captcha_wait").hide();
  }).onSuccess(function () {
    var result = captchaObj.getValidate();
    if (!result) { return alert('请完成验证'); }
    $.captchaResult = result;
    $.captchaObj = captchaObj;
  });
};

/* ===== Submit handler (unchanged logic) ===== */
function submitPay(obj) {
  var csrf_token = $("#csrf_token").val();
  var money      = $("#money").val();
  var typeid     = $(obj).val();

  if (money == '') { layer.alert("金额不能为空"); return false; }
  if (captcha_open == 1 && !$.captchaResult) { layer.alert('请先完成滑动验证！'); return false; }

  var postData = { money: money, typeid: typeid, csrf_token: csrf_token };
  if ($.captchaResult) { $.extend(postData, $.captchaResult); }

  var ii = layer.load();
  $.ajax({
    type: "POST",
    dataType: "json",
    data: postData,
    url: "/user/testpay/submit",
    success: function (data) {
      layer.close(ii);
      if (data.code == 200 && data.data && data.data.url) {
        window.location.href = data.data.url;
      } else {
        layer.alert(data.msg || '提交失败', { icon: 2 });
        if ($.captchaObj) $.captchaObj.reset();
      }
    },
    error: function () {
      layer.close(ii);
      layer.msg('服务器错误', { icon: 2 });
    }
  });
  return false;
}

/* ===== Init (unchanged logic, updated HTML generation) ===== */
$(document).ready(function () {
  {if $show_success}
  {else/}
  $.get("/user/testpay/init").done(function (data) {
    if (data.code !== 200 || !data.data) {
      $("#paytype_wrap").html(
        '<div class="btn-group" role="group"><button type="button" class="pay-method-btn" disabled>' +
        (data.msg || '初始化失败') + '</button></div>'
      );
      return;
    }

    var d = data.data;
    $("#csrf_token").val(d.csrf_token || '');
    $("#trade_no").val(d.trade_no || '');
    $("#money").val(d.money || 1);

    /* Build pay-method buttons */
    var html = '';
    $.each(d.paytype || [], function (i, row) {
      html += '<div class="btn-group" role="group">' +
        '<button type="button" name="type" value="' + row.id + '" ' +
        'class="pay-method-btn" onclick="submitPay(this)">' +
        '<img src="/static/icon/' + row.name + '.png" height="20" ' +
        'onerror="this.style.display=\'none\'">' +
        (row.showname || row.name) +
        '</button></div>';
    });
    $("#paytype_wrap").html(
      html ||
      '<div class="btn-group" role="group"><button type="button" class="pay-method-btn" disabled>暂无支付方式</button></div>'
    );

    /* Captcha */
    if (d.captcha_open) {
      captcha_open = 1;
      $("#captcha").show();
      $.get("/user/common/captcha").done(function (cr) {
        if (cr.code !== 200 || !cr.data) return;
        var cfg = cr.data;
        $('#captcha_text').hide();
        $('#captcha_wait').show();
        if (cfg.version == 1) {
          initGeetest4({
            captchaId: cfg.gt || cfg.captcha_id,
            product: 'popup',
            protocol: 'https://',
            riskType: 'ai',
            hideSuccess: true,
            nativeButton: { width: '100%' }
          }, handlerEmbed);
        } else if (typeof initGeetest === 'function') {
          initGeetest({
            gt:          cfg.gt,
            challenge:   cfg.challenge,
            new_captcha: cfg.new_captcha,
            product:     "popup",
            width:       "100%",
            offline:     !cfg.success
          }, handlerEmbed);
        }
      });
    }
  }).fail(function () {
    $("#paytype_wrap").html(
      '<div class="btn-group" role="group"><button type="button" class="pay-method-btn" disabled>网络错误</button></div>'
    );
  });
  {/if}
});
</script>
</body>
</html>
